name: Keystone Studio - Preview

# First-cut CI/CD for keystone-studio's Cloudflare Worker. Not yet verified
# against a real run (no Cloudflare credentials available while authoring
# this) — expect to fix up exact wrangler output parsing after the first PR.

on:
  pull_request:
    branches:
      - main
    # Broad pre-filter across all workspace packages — the detect-changes job
    # below narrows this down to "does keystone-studio itself need a rebuild",
    # since it depends on other workspace packages (e.g. ts-utils) that live
    # outside packages/keystone-studio/.
    paths:
      - "packages/**"
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: keystone-studio-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: packages/keystone-studio

jobs:
  detect-changes:
    if: github.event.action != 'closed'
    name: Detect Keystone Studio Changes
    runs-on: ubuntu-latest
    outputs:
      affected: ${{ steps.check.outputs.affected }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # turbo --affected needs full history to diff against main —
          # a shallow checkout makes it fail open (treats everything as
          # affected), which is safe but defeats the point of this job.
          fetch-depth: 0

      - name: Read Node.js Version
        working-directory: .
        run: echo "NODE_VERSION=$(cat .nvmrc)" >> $GITHUB_ENV

      - name: Enable Corepack
        run: corepack enable

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"

      - name: Install Dependencies
        working-directory: .
        run: yarn install --immutable

      - name: Check if keystone-studio is affected
        id: check
        working-directory: .
        run: |
          npx turbo run build --affected --dry=json > /tmp/turbo-affected.json
          AFFECTED=$(jq '.packages | index("@keystone-css/studio") != null' /tmp/turbo-affected.json)
          echo "Affected packages: $(jq -c '.packages' /tmp/turbo-affected.json)"
          echo "affected=$AFFECTED" >> "$GITHUB_OUTPUT"

  deploy-preview:
    needs: detect-changes
    if: github.event.action != 'closed' && needs.detect-changes.outputs.affected == 'true'
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DB_NAME: keystone-studio-pr-${{ github.event.pull_request.number }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Read Node.js Version
        working-directory: .
        run: echo "NODE_VERSION=$(cat .nvmrc)" >> $GITHUB_ENV

      - name: Enable Corepack
        run: corepack enable

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"

      - name: Install Dependencies
        working-directory: .
        run: yarn install --immutable

      - name: Prepare a throwaway preview config
        # Never edit the tracked wrangler.jsonc — copy it outside the repo
        # (into the runner's own temp dir) and patch only that copy. The
        # tracked file stays immutable across every CI run.
        run: |
          cp wrangler.jsonc "$RUNNER_TEMP/wrangler.preview.jsonc"
          echo "PREVIEW_CONFIG=$RUNNER_TEMP/wrangler.preview.jsonc" >> "$GITHUB_ENV"

      - name: Check for an existing preview database
        id: check
        run: |
          if INFO=$(npx wrangler d1 info "$DB_NAME" --json 2>/dev/null); then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            DB_ID=$(node -e "const d=JSON.parse(process.argv[1]); console.log(d.result?.uuid ?? d.uuid)" "$INFO")
            echo "db_id=$DB_ID" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create the preview database
        # First push on this PR — also wires database_id into $PREVIEW_CONFIG
        # via --update-config, so the "point config" step below is skipped.
        if: steps.check.outputs.exists != 'true'
        run: npx wrangler d1 create "$DB_NAME" --binding keystone_studio --env preview --update-config --config "$PREVIEW_CONFIG"

      - name: Point the throwaway config at the existing database
        # A later push to the same PR — the database's already there, but
        # this fresh $PREVIEW_CONFIG copy doesn't know its id yet.
        if: steps.check.outputs.exists == 'true'
        run: node scripts/ci/set-preview-d1.mjs "$PREVIEW_CONFIG" "$DB_NAME" "${{ steps.check.outputs.db_id }}"

      - name: Apply migrations to the preview database
        run: npx wrangler d1 migrations apply "$DB_NAME" --remote

      - name: Upload preview version
        id: deploy
        run: |
          OUTPUT=$(npx wrangler versions upload --config "$PREVIEW_CONFIG" --env preview --preview-alias "pr-${{ github.event.pull_request.number }}")
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' | head -1)
          echo "preview_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on the PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: keystone-studio-preview
          message: |
            ### 🔗 Keystone Studio preview

            ${{ steps.deploy.outputs.preview_url }}

            Rebuilds automatically on every push to this PR.

  cleanup-preview:
    if: github.event.action == 'closed'
    name: Delete PR Preview Database
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DB_NAME: keystone-studio-pr-${{ github.event.pull_request.number }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Read Node.js Version
        working-directory: .
        run: echo "NODE_VERSION=$(cat .nvmrc)" >> $GITHUB_ENV

      - name: Enable Corepack
        run: corepack enable

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"

      - name: Install Dependencies
        working-directory: .
        run: yarn install --immutable

      - name: Delete the PR's preview database
        run: npx wrangler d1 delete "$DB_NAME" --skip-confirmation || true
